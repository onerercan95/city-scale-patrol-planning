run_name: "la-central-2023-01-15"

data:
  csv_path: "data/LA_Crime_Data_from_2020_to_2024.csv"
  area_name: "Central"
  history_start: "2023-01-01"
  history_end: "2023-01-31"
  chunk_size: 100000

grid:
  rows: 12
  columns: 12

time:
  period_minutes: 30
  shifts_per_day: 3

scenario:
  mode: "replay"
  replay_date: "2023-01-15"
  officers: 30
  random_seed: 42

vfop:
  baseline: 0.05

travel:
  periods_per_grid_step: 1

minp:
  max_labels: 8000

maxp:
  cost_scale: 10000

experiment:
  replay_dates:
    - "2023-01-01"
    - "2023-01-04"
    - "2023-01-06"
    - "2023-01-15"
    - "2023-01-25"
  officer_counts: [20, 25, 30, 35, 40]

output:
  directory: "artifacts/la_central_2023_01_15"
